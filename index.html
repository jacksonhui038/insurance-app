<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>SET理財規劃管家 - 保險代理人團隊協作系統</title>
<meta property="og:title" content="SET理財規劃管家 · 團隊協作系統" />
<meta property="og:description" content="代理人版：客戶 / 保單 / 佣金 / 行程 | 經理版：團隊業績 / 下鑽 / 活動總覽" />
<meta property="og:type" content="website" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 40%,#2563eb 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#e2e8f0;overflow-x:hidden}
.container{max-width:520px;width:100%;padding:20px}
.card{background:#fff;border-radius:24px;padding:36px 28px 32px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.35)}
.logo{width:140px;height:140px;margin:0 auto 8px;display:block}
h1{font-size:26px;color:#0f172a;margin-bottom:6px;font-weight:700}
.subtitle{color:#64748b;font-size:14px;margin-bottom:28px;line-height:1.5}

.btn-row{display:flex;gap:12px;margin-bottom:16px}
.btn{flex:1;padding:16px 8px;border-radius:14px;font-size:15px;font-weight:600;text-decoration:none;cursor:pointer;transition:.2s;border:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8;transform:translateY(-2px);box-shadow:0 10px 28px rgba(37,99,235,.45)}
.btn-dark{background:#0f172a;color:#fff}
.btn-dark:hover{background:#1e293b;transform:translateY(-2px);box-shadow:0 10px 28px rgba(15,23,42,.35)}

.copy-row{display:flex;gap:8px;margin-top:8px}
.copy-btn{flex:1;padding:9px;border-radius:10px;font-size:13px;background:#f1f5f9;color:#334155;border:1px solid #cbd5e1;cursor:pointer;transition:.15s}
.copy-btn:hover{background:#e2e8f0}
.copy-btn.copied{background:#dcfce7;color:#166534;border-color:#86efac}

.qr-section{margin-top:28px;border-top:1px solid #e2e8f0;padding-top:22px}
.qr-label{font-size:13px;color:#94a3b8;margin-bottom:14px}
.qr-grid{display:flex;justify-content:center;gap:20px}
.qr-item{text-align:center}
.qr-item img{border-radius:12px;border:2px solid #e2e8f0;width:150px;height:150px}
.qr-item span{display:block;font-size:12px;color:#64748b;margin-top:6px}

.tip{margin-top:18px;font-size:11px;color:#94a3b8;line-height:1.7}
.tip strong{color:#2563eb}
.footer{margin-top:20px;font-size:11px;color:#94a3b8}
.footer a{color:#2563eb;text-decoration:none}

@media(max-width:420px){
  .btn-row{flex-direction:column}
  .qr-grid{gap:14px}
  .qr-item img{width:130px;height:130px}
  .card{padding:28px 20px 24px}
}
</style>
<script>
/* v3.10.41: 移除 Service Worker — 開頁立即註銷任何舊 SW，回復正常靜態站行為 */
(function(){
  if ('serviceWorker' in navigator && navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){ try { r.unregister(); } catch(e){} });
    }).catch(function(){});
  }
})();
</script>
</head>
<body>
<div class="container">
  <div class="card">
    <img class="logo" src="set-logo.png?v=4" alt="SET Logo" draggable="false">
    <h1>SET理財規劃管家</h1>
    <p class="subtitle">保險代理人團隊協作系統<br><small style="color:#94a3b8">手機 / 平板 / 電腦皆可使用 · 數據雲端同步</small></p>

    <div class="btn-row">
      <a href="app.html" class="btn btn-primary">📱 代理人版</a>
      <a href="manager-dashboard.html" class="btn btn-dark">👔 經理版</a>
    </div>

    <div class="copy-row">
      <button class="copy-btn" onclick="cp('agent')" id="cb-agent">📋 複製代理人版連結</button>
      <button class="copy-btn" onclick="cp('mgr')" id="cb-mgr">📋 複製經理版連結</button>
    </div>

    <!-- QR Codes -->
    <div class="qr-section">
      <div class="qr-label">📷 微信 / WhatsApp 分享：截圖或長存以下二維碼發送</div>
      <div class="qr-grid">
        <div class="qr-item">
          <img src="qr-agent.png" alt="代理人版二維碼">
          <span>代理人版</span>
        </div>
        <div class="qr-item">
          <img src="qr-manager.png" alt="經理版二維碼">
          <span>經理版</span>
        </div>
      </div>
    </div>

    <p class="tip"><strong>提示：</strong> 微信用戶直接掃二維碼即可打開（無需手動輸入網址）。<br>如頁面顯示舊版，請在 URL 後面加上 <code>?v=new</code> 刷新。</p>

    <p class="footer">© 2025–2026 SET理財規劃管家 · 由 <a href="https://github.com/jacksonhui038/insurance-app" target="_blank">GitHub</a> 託管</p>
  </div>
</div>

<script>
var BASE = location.origin + location.pathname.replace(/\/$/, '');
function cp(type) {
  var url = type === 'agent' ? BASE + '/app.html' : BASE + '/manager-dashboard.html';
  navigator.clipboard.writeText(url).then(function() {
    var el = document.getElementById('cb-' + type);
    el.textContent = '✅ 已複製！';
    el.classList.add('copied');
    setTimeout(function() {
      el.textContent = type === 'agent' ? '📋 複製代理人版連結' : '📋 複製經理版連結';
      el.classList.remove('copied');
    }, 2000);
  });
}
</script>
</body>
</html>
