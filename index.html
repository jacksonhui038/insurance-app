<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保經管家 - 保險經紀團隊協作系統</title>
<meta property="og:title" content="保經管家 · 團隊協作系統" />
<meta property="og:description" content="代理人版：客戶 / 保單 / 佣金 / 行程 | 經理版：團隊業績 / 下鑽 / 活動總覽" />
<meta property="og:type" content="website" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 40%,#2563eb 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#e2e8f0;overflow-x:hidden}
.container{max-width:520px;width:100%;padding:20px}
.card{background:#fff;border-radius:24px;padding:36px 28px 32px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.35)}
.logo{width:140px;height:140px;margin:0 auto 8px;display:block}
h1{font-size:26px;color:#0f172a;margin-bottom:6px;font-weight:700}
.subtitle{color:#64748b;font-size:14px;margin-bottom:28px;line-height:1.5}

.btn-row{display:flex;gap:12px;margin-bottom:16px}
.btn{flex:1;padding:16px 8px;border-radius:14px;font-size:15px;font-weight:600;text-decoration:none;cursor:pointer;transition:.2s;border:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8;transform:translateY(-2px);box-shadow:0 10px 28px rgba(37,99,235,.45)}
.btn-dark{background:#0f172a;color:#fff}
.btn-dark:hover{background:#1e293b;transform:translateY(-2px);box-shadow:0 10px 28px rgba(15,23,42,.35)}

.copy-row{display:flex;gap:8px;margin-top:8px}
.copy-btn{flex:1;padding:9px;border-radius:10px;font-size:13px;background:#f1f5f9;color:#334155;border:1px solid #cbd5e1;cursor:pointer;transition:.15s}
.copy-btn:hover{background:#e2e8f0}
.copy-btn.copied{background:#dcfce7;color:#166534;border-color:#86efac}

.qr-section{margin-top:28px;border-top:1px solid #e2e8f0;padding-top:22px}
.qr-label{font-size:13px;color:#94a3b8;margin-bottom:14px}
.qr-grid{display:flex;justify-content:center;gap:20px}
.qr-item{text-align:center}
.qr-item img{border-radius:12px;border:2px solid #e2e8f0;width:150px;height:150px}
.qr-item span{display:block;font-size:12px;color:#64748b;margin-top:6px}

.tip{margin-top:18px;font-size:11px;color:#94a3b8;line-height:1.7}
.tip strong{color:#2563eb}
.footer{margin-top:20px;font-size:11px;color:#94a3b8}
.footer a{color:#2563eb;text-decoration:none}

@media(max-width:420px){
  .btn-row{flex-direction:column}
  .qr-grid{gap:14px}
  .qr-item img{width:130px;height:130px}
  .card{padding:28px 20px 24px}
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <svg class="logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="flameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ff6a00"/>
          <stop offset="40%" stop-color="#ff3d00"/>
          <stop offset="80%" stop-color="#e01000"/>
          <stop offset="100%" stop-color="#8e0000"/>
        </linearGradient>
        <linearGradient id="flameGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#ff5a00"/>
          <stop offset="50%" stop-color="#ff2a00"/>
          <stop offset="100%" stop-color="#b81212"/>
        </linearGradient>
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="55%">
          <stop offset="0%" stop-color="#ffd9a0"/>
          <stop offset="100%" stop-color="#ff6a00"/>
        </radialGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- 外層火焰光暈 -->
      <circle cx="100" cy="100" r="92" fill="url(#flameGrad)" opacity="0.45"/>
      <circle cx="100" cy="100" r="82" fill="url(#flameGrad)" opacity="0.70"/>
      <!-- 火焰環（24個火焰尖） -->
      <g filter="url(#glow)">
        <path d="M100,18
                 C108,32 116,38 120,52
                 C124,38 132,32 140,18
                 C132,30 138,40 134,52
                 C142,42 152,40 162,30
                 C156,42 158,54 150,60
                 C160,56 172,58 182,52
                 C176,62 172,72 162,74
                 C172,80 178,90 182,100
                 C172,98 162,98 154,102
                 C164,108 170,118 168,130
                 C160,124 152,122 144,124
                 C150,134 152,144 144,156
                 C138,148 130,144 122,146
                 C124,156 120,166 110,176
                 C108,164 102,158 94,158
                 C92,168 84,176 72,182
                 C72,170 68,162 60,158
                 C54,166 44,168 32,164
                 C40,156 42,146 38,138
                 C28,142 18,138 8,128
                 C18,124 26,118 28,108
                 C18,108 10,100 8,86
                 C18,90 28,88 36,82
                 C28,74 24,62 28,48
                 C36,56 46,58 54,54
                 C48,44 50,32 60,22
                 C64,32 72,38 80,38
                 C76,28 80,18 92,10
                 C92,22 98,28 100,40
                 C100,28 100,22 100,18 Z"
                 fill="url(#flameGrad2)" opacity="1"/>
      </g>
      <!-- 內圈白色底 -->
      <circle cx="100" cy="100" r="62" fill="url(#centerGlow)" stroke="url(#flameGrad)" stroke-width="2"/>
      <!-- SET 字 -->
      <text x="100" y="118" text-anchor="middle" font-family="'Arial Black','Helvetica Neue',sans-serif" font-size="44" font-weight="900" fill="url(#flameGrad2)" letter-spacing="-1">SET</text>
    </svg>
    <h1>保經管家</h1>
    <p class="subtitle">保險經紀團隊協作系統<br><small style="color:#94a3b8">手機 / 平板 / 電腦皆可使用 · 數據雲端同步</small></p>

    <div class="btn-row">
      <a href="agent-app.html" class="btn btn-primary">📱 代理人版</a>
      <a href="manager-dashboard.html" class="btn btn-dark">👔 經理版</a>
    </div>

    <div class="copy-row">
      <button class="copy-btn" onclick="cp('agent')" id="cb-agent">📋 複製代理人版連結</button>
      <button class="copy-btn" onclick="cp('mgr')" id="cb-mgr">📋 複製經理版連結</button>
    </div>

    <!-- QR Codes -->
    <div class="qr-section">
      <div class="qr-label">📷 微信 / WhatsApp 分享：截圖或長存以下二維碼發送</div>
      <div class="qr-grid">
        <div class="qr-item">
          <img src="qr-agent.png" alt="代理人版二維碼">
          <span>代理人版</span>
        </div>
        <div class="qr-item">
          <img src="qr-manager.png" alt="經理版二維碼">
          <span>經理版</span>
        </div>
      </div>
    </div>

    <p class="tip"><strong>提示：</strong> 微信用戶直接掃二維碼即可打開（無需手動輸入網址）。<br>如頁面顯示舊版，請在 URL 後面加上 <code>?v=new</code> 刷新。</p>

    <p class="footer">© 2025–2026 保經管家 · 由 <a href="https://github.com/jacksonhui038/insurance-app" target="_blank">GitHub</a> 託管</p>
  </div>
</div>

<script>
var BASE = location.origin + location.pathname.replace(/\/$/, '');
function cp(type) {
  var url = type === 'agent' ? BASE + '/agent-app.html' : BASE + '/manager-dashboard.html';
  navigator.clipboard.writeText(url).then(function() {
    var el = document.getElementById('cb-' + type);
    el.textContent = '✅ 已複製！';
    el.classList.add('copied');
    setTimeout(function() {
      el.textContent = type === 'agent' ? '📋 複製代理人版連結' : '📋 複製經理版連結';
      el.classList.remove('copied');
    }, 2000);
  });
}
</script>
</body>
</html>
