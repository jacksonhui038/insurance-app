<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保經管家 - 團隊協作系統</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="保經管家">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
.container { max-width:480px; width:100%; padding:24px; }
.card { background:#fff; border-radius:20px; padding:40px 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align:center; }
.logo { font-size:56px; margin-bottom:16px; }
h1 { font-size:24px; color:#1e293b; margin-bottom:8px; }
.subtitle { color:#64748b; font-size:14px; margin-bottom:32px; }
.btn { display:block; width:100%; padding:16px; border-radius:12px; font-size:16px; font-weight:600; text-decoration:none; margin-bottom:12px; transition:all 0.2s; cursor:pointer; border:none; }
.btn-primary { background:#2563eb; color:#fff; }
.btn-primary:hover { background:#1d4ed8; transform:translateY(-2px); box-shadow:0 8px 24px rgba(37,99,235,0.4); }
.btn-secondary { background:#f1f5f9; color:#1e293b; }
.btn-secondary:hover { background:#e2e8f0; transform:translateY(-2px); }
.footer { margin-top:24px; color:#94a3b8; font-size:12px; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="logo">🏢</div>
    <h1>保經管家</h1>
    <p class="subtitle">保險經紀團隊協作系統</p>
    <a href="agent-app.html" class="btn btn-primary">📱 代理人版（我自己用）</a>
    <a href="manager-dashboard.html" class="btn btn-secondary">👔 經理版（管理團隊）</a>
    <p class="footer">手機、平板、電腦皆可使用 | 數據本地儲存</p>
  </div>
</div>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').then(function(r){console.log('[PWA] Service Worker 已註冊:',r.scope);}).catch(function(e){console.warn('[PWA] SW 註冊失敗:',e);});}
</script>
</body>
</html>
